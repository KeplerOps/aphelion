name: CI

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # ADR Conformance — architecture decision enforcement
  # ---------------------------------------------------------------------------
  adr-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate ADR manifest files exist
        run: |
          test -f docs/approved-extensions.yaml || { echo "FAIL: docs/approved-extensions.yaml missing (ADR-006)"; exit 1; }
          test -f docs/compatibility-versions.yaml || { echo "FAIL: docs/compatibility-versions.yaml missing (ADR-010)"; exit 1; }
          test -f docs/language-deviations.yaml || { echo "FAIL: docs/language-deviations.yaml missing (ADR-004)"; exit 1; }

      - name: Validate YAML syntax
        run: |
          python3 -c "import yaml; yaml.safe_load(open('docs/approved-extensions.yaml'))"
          python3 -c "import yaml; yaml.safe_load(open('docs/compatibility-versions.yaml'))"
          python3 -c "import yaml; yaml.safe_load(open('docs/language-deviations.yaml'))"

      - name: Run ADR conformance checks
        run: |
          if [ -d src/ ]; then
            scripts/check-adr-conformance.sh
          else
            echo "No src/ directory yet — skipping source file checks"
          fi

  # ---------------------------------------------------------------------------
  # Lint — formatting and static analysis
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    needs: [adr-conformance]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4
      - name: Check formatting (Spotless)
        run: ./gradlew spotlessCheck
      - name: Static analysis (SpotBugs)
        run: ./gradlew spotbugsMain

  # ---------------------------------------------------------------------------
  # Test — unit tests and architecture tests
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4
      - name: Build and test
        run: ./gradlew build
