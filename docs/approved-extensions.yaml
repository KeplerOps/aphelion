# Approved Extensions and Engine-Adjacent Dependencies
# ADR-006: All extensions must pass security, operational, and license review.
#
# Add new entries here BEFORE adding the dependency to the project.
# The stop hook and CI will block if dependency files change without
# a corresponding update to this file.
#
# See docs/adr-enforcement.md for the full enforcement system reference.

schema_version: 1

# Each entry must include:
#   name: Package/extension name
#   version: Approved version or version constraint
#   license: SPDX license identifier
#   approved_date: ISO-8601 date of approval
#   approved_by: Reviewer name or handle
#   purpose: Why this dependency is needed
#   security_review: ISO-8601 date of security review, or "pending"
#   notes: Any constraints on usage (optional)

